    <!-- 1. Organization (entity recognition for AI/ChatGPT) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "ChefNet LLC",
      "alternateName": ["ChefNet Invest", "ChefNet"],
      "url": "https://chefnet.ai",
      "logo": {
        "@type": "ImageObject",
        "url": "https://chefnet.ai/vite.svg",
        "width": 512,
        "height": 512
      },
      "description": "ChefNet LLC is a FoodTech company developing an AI-powered restaurant management ecosystem. ChefNet Invest is the company's crowdfunding and investor platform allowing global investors to purchase tokenized company shares.",
      "foundingDate": "2023",
      "industry": "FoodTech",
      "keywords": "FoodTech, restaurant technology, AI, food delivery, investment platform",
      "sameAs": [],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "investor relations",
        "availableLanguage": ["English", "Russian", "German", "Spanish", "Turkish"]
      },
      "knowsAbout": [
        "FoodTech investment",
        "restaurant automation",
        "AI-powered food ordering",
        "tokenized shares",
        "crowdfunding platform"
      ]
    }
    </script>

    <!-- 2. WebSite (enables Google Sitelinks Search) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "ChefNet Invest",
      "alternateName": "chefnet.ai",
      "url": "https://chefnet.ai",
      "description": "AI-powered FoodTech investment platform by ChefNet LLC. Invest in tokenized shares, earn referral commissions, and track your portfolio.",
      "inLanguage": ["en", "ru", "de", "es", "tr"],
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://chefnet.ai/?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- 3. WebApplication / FinancialService -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": ["WebApplication", "FinancialService"],
      "name": "ChefNet Invest",
      "url": "https://chefnet.ai",
      "applicationCategory": "InvestmentApplication",
      "operatingSystem": "Web",
      "description": "ChefNet Invest is a FoodTech crowdfunding and investment platform. Users can invest in ChefNet LLC through tokenized share rounds (Seed, Private, Marketing, Public IPO), earn 10% referral commissions paid in company shares, pass KYC verification, and manage their portfolio through a real-time dashboard.",
      "offers": {
        "@type": "Offer",
        "name": "ChefNet Share Rounds",
        "description": "Investment rounds in ChefNet FoodTech company shares — Seed Round, Private Round, Marketing Round, and Public IPO",
        "priceCurrency": "USD",
        "availability": "https://schema.org/InStock"
      },
      "featureList": [
        "AI-powered investor dashboard",
        "Tokenized company shares",
        "10% referral commission program",
        "KYC identity verification via Sumsub",
        "Multi-language support (EN, RU, DE, ES, TR)",
        "Real-time portfolio tracking",
        "4 investment rounds: Seed, Private, Marketing, Public IPO"
      ],
      "availableLanguage": [
        {"@type": "Language", "name": "English"},
        {"@type": "Language", "name": "Russian"},
        {"@type": "Language", "name": "German"},
        {"@type": "Language", "name": "Spanish"},
        {"@type": "Language", "name": "Turkish"}
      ]
    }
    </script>

    <!-- 4. FAQ Schema (optimized for ChatGPT, Perplexity, Google SGE) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is ChefNet Invest?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "ChefNet Invest (chefnet.ai) is an AI-powered FoodTech investment platform developed by ChefNet LLC. It allows global investors to buy tokenized shares in ChefNet's restaurant technology ecosystem across multiple investment rounds — Seed, Private, Marketing, and Public IPO."
          }
        },
        {
          "@type": "Question",
          "name": "What is ChefNet and what does it do?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "ChefNet is a FoodTech company building an AI-powered ecosystem for restaurants, including smart food ordering, restaurant management automation, and delivery optimization. ChefNet Invest allows investors to participate in the company's growth by purchasing company shares through tokenized investment rounds."
          }
        },
        {
          "@type": "Question",
          "name": "How does the ChefNet referral program work?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "ChefNet Invest features a 10% referral commission program. When you refer a new investor who makes an investment, you receive 10% of their investment amount credited as ChefNet shares to your portfolio. Each user gets a unique referral code (format: CHEF-XXXXXX) to share."
          }
        },
        {
          "@type": "Question",
          "name": "What investment rounds does ChefNet offer?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "ChefNet Invest offers four investment rounds: 1) Seed Round — early-stage investment at the lowest share price; 2) Private Round — for accredited investors; 3) Marketing Round — expanding the investor base; 4) Public IPO — the final public offering round. Each round has different share prices and minimum investment requirements."
          }
        },
        {
          "@type": "Question",
          "name": "Is KYC verification required to invest in ChefNet?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, KYC (Know Your Customer) identity verification is required on ChefNet Invest. The platform uses Sumsub for secure, fast identity verification. KYC is mandatory to comply with financial regulations and ensure investor security."
          }
        },
        {
          "@type": "Question",
          "name": "What languages does ChefNet Invest support?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "ChefNet Invest is fully available in 5 languages: English, Russian (Русский), German (Deutsch), Spanish (Español), and Turkish (Türkçe). All platform features, documents, and the investor dashboard are accessible in all supported languages."
          }
        },
        {
          "@type": "Question",
          "name": "How do I access my investor portfolio on ChefNet?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "After registering and verifying your email on chefnet.ai, you can log in and access your personal investor dashboard. The dashboard shows your total shares, portfolio value, referral statistics, KYC status, and the full investment history with real-time data."
          }
        },
        {
          "@type": "Question",
          "name": "What is the minimum investment amount on ChefNet Invest?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The minimum investment amount varies by round. Each investment round on ChefNet Invest has its own minimum order requirement, which is displayed on the investment page. Contact ChefNet investor relations for the current minimums per round."
          }
        }
      ]
    }
    </script>
